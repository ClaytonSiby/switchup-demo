<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self-Healing Scraper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0b0b0f;
  --surface:     #111118;
  --raised:      #18181f;
  --border:      rgba(255,255,255,0.07);
  --border-hi:   rgba(255,255,255,0.12);
  --text:        #e2e2e9;
  --muted:       #6b6b7a;
  --dim:         #3a3a46;
  --indigo:      #818cf8;
  --indigo-dim:  rgba(129,140,248,0.12);
  --green:       #4ade80;
  --green-dim:   rgba(74,222,128,0.1);
  --red:         #f87171;
  --red-dim:     rgba(248,113,113,0.1);
  --amber:       #fbbf24;
  --amber-dim:   rgba(251,191,36,0.1);
  --cyan:        #22d3ee;
  --violet:      #c084fc;
  --r:           8px;
  --ui:          'Inter', system-ui, sans-serif;
  --mono:        'JetBrains Mono', monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--ui); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

/* ── Layout ── */
.app { display: grid; grid-template-rows: 64px 60px 1fr; height: 100vh; overflow: hidden; }

/* ── Header ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; border-bottom: 1px solid var(--border);
  background: var(--surface); gap: 16px;
}
.logo {
  width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
  background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.title-wrap { display: flex; flex-direction: column; gap: 1px; }
.title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
.subtitle { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.header-left { display: flex; align-items: center; gap: 12px; }
.header-right { display: flex; align-items: center; gap: 10px; }

.status-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
  font-size: 11px; font-weight: 500; color: var(--muted); transition: all 0.3s;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); transition: background 0.3s; }
.status-pill.running { border-color: rgba(251,191,36,0.3); color: var(--amber); }
.status-pill.running .status-dot { background: var(--amber); animation: blink 1s ease-in-out infinite; }
.status-pill.done { border-color: rgba(74,222,128,0.3); color: var(--green); }
.status-pill.done .status-dot { background: var(--green); }
.status-pill.error { border-color: rgba(248,113,113,0.3); color: var(--red); }
.status-pill.error .status-dot { background: var(--red); }

.run-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 16px; border: none; border-radius: 7px;
  background: #4f46e5; color: #fff; font-family: var(--ui); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background 0.15s, opacity 0.15s; letter-spacing: -0.1px;
}
.run-btn:hover:not(:disabled) { background: #4338ca; }
.run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.run-btn svg { width: 12px; height: 12px; }

/* ── Pipeline steps ── */
.pipeline {
  display: flex; align-items: center; padding: 0 24px; gap: 0;
  border-bottom: 1px solid var(--border); background: var(--surface); overflow-x: auto;
}
.step { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.step-node {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1.5px solid var(--dim); color: var(--dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; transition: all 0.35s;
}
.step-label { font-size: 12px; font-weight: 500; color: var(--dim); transition: color 0.35s; white-space: nowrap; }
.step-line { flex: 1; min-width: 32px; height: 1px; background: var(--dim); margin: 0 10px; opacity: 0.3; transition: all 0.4s; }

.step.running .step-node { border-color: var(--indigo); color: var(--indigo); animation: pulse 1.6s ease-in-out infinite; }
.step.running .step-label { color: var(--indigo); }
.step.done .step-node { border-color: var(--green); background: var(--green-dim); color: var(--green); }
.step.done .step-label { color: var(--green); }
.step.done + .step-line { background: var(--green); opacity: 0.4; }
.step.error .step-node { border-color: var(--red); background: var(--red-dim); color: var(--red); }
.step.error .step-label { color: var(--red); }

@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(129,140,248,0.5); } 50% { box-shadow: 0 0 0 7px rgba(129,140,248,0); } }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ── Main ── */
.main { display: grid; grid-template-columns: 1fr 380px; overflow: hidden; }

/* ── Terminal ── */
.pane { display: flex; flex-direction: column; overflow: hidden; }
.pane-header {
  display: flex; align-items: center; gap: 6px;
  padding: 0 16px; height: 38px; border-bottom: 1px solid var(--border);
  background: var(--surface); font-size: 11px; font-weight: 600;
  color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; flex-shrink: 0;
}
.traffic { display: flex; gap: 5px; margin-right: 6px; }
.traffic span { width: 10px; height: 10px; border-radius: 50%; }
.traffic-red   { background: #ff5f57; }
.traffic-amber { background: #febc2e; }
.traffic-green { background: #28c840; }

.terminal { flex: 1; overflow-y: auto; padding: 14px 16px; font-family: var(--mono); font-size: 12px; line-height: 1.8; }
.terminal:empty::after { content: 'Waiting for run…'; color: var(--dim); font-style: italic; }

.log-row { display: grid; grid-template-columns: 54px 74px 1fr; gap: 10px; animation: fadein 0.2s ease; align-items: baseline; }
.log-time  { color: var(--dim); }
.log-src   { font-weight: 500; }
.log-msg   { color: var(--text); }
.log-src-scraper  { color: var(--cyan); }
.log-src-healer   { color: var(--violet); }
.log-src-sandbox  { color: var(--amber); }
.log-src-diff     { color: var(--green); }
.log-src-langfuse { color: var(--muted); }
.log-src-error    { color: var(--red); }
.log-warn { color: var(--amber) !important; }

/* ── Results ── */
.results-pane { border-left: 1px solid var(--border); }
.results { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.results:empty::after { content: 'Results will appear here…'; color: var(--dim); font-size: 12px; font-style: italic; padding: 8px; }

/* ── Cards ── */
.card {
  border-radius: var(--r); border: 1px solid var(--border);
  background: var(--raised); overflow: hidden; animation: slidein 0.3s ease;
}
.card-head {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; border-bottom: 1px solid var(--border);
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
}
.card-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.card-body { padding: 14px; }

.card-failure { border-color: rgba(248,113,113,0.2); }
.card-failure .card-head { color: var(--red); }
.card-failure .card-dot  { background: var(--red); }

.card-proposal { border-color: rgba(129,140,248,0.2); }
.card-proposal .card-head { color: var(--indigo); }
.card-proposal .card-dot  { background: var(--indigo); }

.card-sandbox { border-color: rgba(251,191,36,0.2); }
.card-sandbox .card-head { color: var(--amber); }
.card-sandbox .card-dot  { background: var(--amber); }

.card-patch { border-color: rgba(74,222,128,0.2); }
.card-patch .card-head { color: var(--green); }
.card-patch .card-dot  { background: var(--green); }

/* Card internals */
.kv { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; font-size: 12px; }
.kv:last-child { margin-bottom: 0; }
.kk { color: var(--muted); min-width: 64px; font-size: 11px; }
.kv-code { font-family: var(--mono); color: var(--text); }
.kv-bad  { font-family: var(--mono); color: var(--red); }
.kv-small { font-size: 11px; color: var(--muted); }

.selector-big { font-family: var(--mono); font-size: 16px; font-weight: 500; color: var(--green); margin-bottom: 14px; }

.conf-wrap { margin-bottom: 12px; }
.conf-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.conf-pct { font-weight: 600; color: var(--text); }
.conf-track { height: 3px; background: var(--border-hi); border-radius: 2px; overflow: hidden; }
.conf-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(.4,0,.2,1); }

.diagnosis { font-size: 12px; color: var(--muted); padding-left: 10px; border-left: 2px solid var(--indigo-dim); line-height: 1.6; margin-bottom: 10px; }
.meta-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 10px; font-family: var(--mono); color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; }

.sandbox-row { display: flex; align-items: center; gap: 12px; }
.sandbox-icon {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 15px;
}
.sandbox-icon.ok  { background: var(--green-dim); border: 1.5px solid rgba(74,222,128,0.4); }
.sandbox-icon.warn { background: var(--amber-dim); border: 1.5px solid rgba(251,191,36,0.4); }
.sandbox-strong { font-size: 13px; font-weight: 600; }
.sandbox-sub { font-size: 11px; color: var(--muted); }

.diff-view { font-family: var(--mono); font-size: 11px; line-height: 1.75; overflow-x: auto; margin-bottom: 12px; }
.dl { display: flex; }
.dl-sign { width: 14px; flex-shrink: 0; text-align: center; }
.dl-text { flex: 1; white-space: pre; }
.dl-add  { color: var(--green); background: var(--green-dim); }
.dl-del  { color: var(--red);   background: var(--red-dim); }
.dl-hunk { color: var(--indigo); background: var(--indigo-dim); }

.apply-box {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; font-family: var(--mono); font-size: 11px; color: var(--green);
}
.apply-prompt { color: var(--dim); }

@keyframes fadein  { from { opacity:0; transform: translateY(3px); } to { opacity:1; transform: none; } }
@keyframes slidein { from { opacity:0; transform: translateX(6px); } to { opacity:1; transform: none; } }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="logo">⚡</div>
      <div class="title-wrap">
        <div class="title">Self-Healing Scraper</div>
        <div class="subtitle">Playwright fails → AI analyzes → generates fix</div>
      </div>
    </div>
    <div class="header-right">
      <div class="status-pill" id="statusPill">
        <div class="status-dot"></div>
        <span id="statusText">Idle</span>
      </div>
      <button class="run-btn" id="runBtn" onclick="startRun()">
        <svg viewBox="0 0 12 12" fill="currentColor"><path d="M2 1.5l8 4.5-8 4.5z"/></svg>
        Run Demo
      </button>
    </div>
  </header>

  <!-- Pipeline steps -->
  <nav class="pipeline">
    <div class="step" id="s-scrape"><div class="step-node">1</div><div class="step-label">Scrape</div></div>
    <div class="step-line"></div>
    <div class="step" id="s-validate"><div class="step-node">2</div><div class="step-label">Validate</div></div>
    <div class="step-line"></div>
    <div class="step" id="s-detect"><div class="step-node">3</div><div class="step-label">Detect</div></div>
    <div class="step-line"></div>
    <div class="step" id="s-heal"><div class="step-node">4</div><div class="step-label">Heal</div></div>
    <div class="step-line"></div>
    <div class="step" id="s-patch"><div class="step-node">5</div><div class="step-label">Patch</div></div>
  </nav>

  <!-- Main -->
  <div class="main">

    <!-- Terminal log -->
    <div class="pane">
      <div class="pane-header">
        <div class="traffic">
          <span class="traffic-red"></span>
          <span class="traffic-amber"></span>
          <span class="traffic-green"></span>
        </div>
        Pipeline Log
      </div>
      <div class="terminal" id="terminal"></div>
    </div>

    <!-- Results -->
    <div class="pane results-pane">
      <div class="pane-header">Results</div>
      <div class="results" id="results"></div>
    </div>

  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const terminal = $('terminal');
const results  = $('results');
const runBtn   = $('runBtn');
const statusPill = $('statusPill');
const statusText = $('statusText');

const STEPS = { scrape:'s-scrape', validate:'s-validate', detect:'s-detect', heal:'s-heal', patch:'s-patch' };

function step(name, state) {
  const el = $(STEPS[name]);
  if (!el) return;
  el.className = 'step ' + state;
  if (state === 'done') el.querySelector('.step-node').textContent = '✓';
  if (state === 'error') el.querySelector('.step-node').textContent = '✕';
}

function setStatus(state, text) {
  statusPill.className = 'status-pill ' + state;
  statusText.textContent = text;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function log(source, message, warn) {
  const d = new Date();
  const t = [d.getHours(), d.getMinutes(), d.getSeconds()].map(n => String(n).padStart(2,'0')).join(':');
  const row = document.createElement('div');
  row.className = 'log-row';
  const msgClass = warn ? 'log-msg log-warn' : 'log-msg';
  row.innerHTML = `<span class="log-time">${t}</span><span class="log-src log-src-${esc(source)}">[${esc(source)}]</span><span class="${msgClass}">${esc(message)}</span>`;
  terminal.appendChild(row);
  terminal.scrollTop = terminal.scrollHeight;
}

function card(cls, titleHtml, bodyHtml) {
  const d = document.createElement('div');
  d.className = 'card ' + cls;
  d.innerHTML = `<div class="card-head"><div class="card-dot"></div>${titleHtml}</div><div class="card-body">${bodyHtml}</div>`;
  results.appendChild(d);
  results.scrollTop = results.scrollHeight;
}

function renderDiff(patch) {
  const lines = patch.split('\n').filter(l => !l.startsWith('#') && l.trim());
  return lines.map(line => {
    if ((line.startsWith('+') && !line.startsWith('+++')) )
      return `<div class="dl dl-add"><span class="dl-sign">+</span><span class="dl-text">${esc(line.slice(1))}</span></div>`;
    if ((line.startsWith('-') && !line.startsWith('---')) )
      return `<div class="dl dl-del"><span class="dl-sign">−</span><span class="dl-text">${esc(line.slice(1))}</span></div>`;
    if (line.startsWith('@@'))
      return `<div class="dl dl-hunk"><span class="dl-text">${esc(line)}</span></div>`;
    return '';
  }).join('');
}

function reset() {
  terminal.innerHTML = '';
  results.innerHTML = '';
  Object.keys(STEPS).forEach(s => {
    const el = $(STEPS[s]);
    el.className = 'step';
    el.querySelector('.step-node').textContent = Object.keys(STEPS).indexOf(s) + 1;
  });
  setStatus('', 'Idle');
}

function handle(evt) {
  switch (evt.type) {

    case 'log':
      log(evt.source, evt.message, evt.warn);
      break;

    case 'scrape:done':
      step('scrape', 'done');
      step('validate', evt.failureCount > 0 ? 'done' : 'done');
      if (evt.failureCount > 0) step('detect', 'running');
      else { step('detect', 'done'); step('heal', 'done'); step('patch', 'done'); }
      break;

    case 'failure':
      step('detect', 'done');
      step('heal', 'running');
      card('card-failure', 'Failure Detected', `
        <div class="kv"><span class="kk">Field</span><span class="kv-code">${esc(evt.field)}</span></div>
        <div class="kv"><span class="kk">Selector</span><span class="kv-bad">${esc(evt.selector)}</span></div>
        <div class="kv"><span class="kk">Error</span><span class="kv-small">${esc(evt.error)}</span></div>
      `);
      break;

    case 'proposal': {
      step('heal', 'done');
      const pct = Math.round(evt.proposal.confidence * 100);
      const fillColor = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
      card('card-proposal', 'AI Proposal', `
        <div class="selector-big">${esc(evt.proposal.new_selector)}</div>
        <div class="conf-wrap">
          <div class="conf-labels"><span>Confidence</span><span class="conf-pct">${pct}%</span></div>
          <div class="conf-track"><div class="conf-fill" style="width:${pct}%;background:${fillColor}"></div></div>
        </div>
        <div class="diagnosis">${esc(evt.proposal.diagnosis)}</div>
        <div class="meta-tags">
          <span class="tag">${evt.latencyMs}ms</span>
          <span class="tag">${evt.inputTokens + evt.outputTokens} tokens</span>
          <span class="tag">llama-3.3-70b</span>
        </div>
      `);
      break;
    }

    case 'sandbox-result': {
      const ok = evt.validCount === evt.totalCount;
      step('patch', 'running');
      card('card-sandbox', 'Sandbox Verified', `
        <div class="sandbox-row">
          <div class="sandbox-icon ${ok ? 'ok' : 'warn'}">${ok ? '✓' : '⚠'}</div>
          <div>
            <div class="sandbox-strong" style="color:${ok ? 'var(--green)' : 'var(--amber)'}">${evt.validCount}/${evt.totalCount} valid records</div>
            <div class="sandbox-sub">${ok ? 'Selector confirmed — safe to apply' : 'Partial match — review before applying'}</div>
          </div>
        </div>
      `);
      break;
    }

    case 'patch':
      step('patch', 'done');
      card('card-patch', 'Patch Ready', `
        <div class="diff-view">${renderDiff(evt.patchContent)}</div>
        <div class="apply-box"><span class="apply-prompt">$</span> git apply output/selectors.patch</div>
      `);
      break;

    case 'done':
      setStatus('done', 'Done');
      break;

    case 'error':
      setStatus('error', 'Error');
      log('error', evt.message);
      break;
  }
}

async function startRun() {
  reset();
  runBtn.disabled = true;
  setStatus('running', 'Running');
  step('scrape', 'running');

  try {
    const res = await fetch('/api/run');
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop() ?? '';
      for (const part of parts) {
        if (!part.startsWith('data:')) continue;
        try { handle(JSON.parse(part.slice(5).trim())); } catch {}
      }
    }
  } catch (err) {
    setStatus('error', 'Error');
    log('error', String(err));
  }

  runBtn.disabled = false;
}
</script>
</body>
</html>
